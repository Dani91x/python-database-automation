<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="emerald-grad" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="hsl(155, 84%, 42%)"/>
      <stop offset="100%" stop-color="hsl(145, 72%, 50%)"/>
    </linearGradient>
    <linearGradient id="gold-grad" x1="100" y1="0" x2="100" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="hsl(45, 93%, 55%)"/>
      <stop offset="100%" stop-color="hsl(38, 95%, 50%)"/>
    </linearGradient>
  </defs>
  <!-- Shield shape -->
  <path d="M100 10 L180 50 L180 120 Q180 170 100 190 Q20 170 20 120 L20 50 Z" fill="url(#emerald-grad)" opacity="0.15" stroke="url(#emerald-grad)" stroke-width="2"/>
  <!-- A letter -->
  <text x="58" y="140" font-family="Sora, sans-serif" font-weight="800" font-size="100" fill="url(#emerald-grad)">A</text>
  <!-- S letter -->
  <text x="108" y="140" font-family="Sora, sans-serif" font-weight="800" font-size="100" fill="url(#gold-grad)">S</text>
  <!-- Trend line accent -->
  <path d="M40 155 L80 145 L120 130 L160 110" stroke="url(#gold-grad)" stroke-width="3" stroke-linecap="round" fill="none"/>
  <circle cx="160" cy="110" r="4" fill="hsl(45, 93%, 55%)"/>
</svg>
