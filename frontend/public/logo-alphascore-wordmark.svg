<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 80" fill="none">
  <defs>
    <linearGradient id="wm-emerald" x1="0" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="hsl(155, 84%, 42%)"/>
      <stop offset="100%" stop-color="hsl(145, 72%, 50%)"/>
    </linearGradient>
    <linearGradient id="wm-gold" x1="0" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="hsl(45, 93%, 55%)"/>
      <stop offset="100%" stop-color="hsl(38, 95%, 50%)"/>
    </linearGradient>
  </defs>
  <!-- ALPHA -->
  <text x="0" y="55" font-family="Sora, sans-serif" font-weight="800" font-size="52" fill="url(#wm-emerald)" letter-spacing="2">ALPHA</text>
  <!-- SCORE -->
  <text x="260" y="55" font-family="Sora, sans-serif" font-weight="800" font-size="52" fill="url(#wm-gold)" letter-spacing="2">SCORE</text>
</svg>
