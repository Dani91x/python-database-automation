name: Retrain ML Models (cloud, all leagues)

# ─────────────────────────────────────────────────────────────────────────────
# CAMPAGNA AUTO-COMPLETANTE, GENTILE SUL DB (riscritta 2026-06-13)
#
# Obiettivo: finire di addestrare TUTTE le leghe (mancanti + vecchie/leaked-era)
# senza mai stressare l'istanza Supabase (tier Nano, I/O del disco basso) e senza
# mai avvicinarsi al timeout GitHub di 6h.
#
# Come funziona:
#   1) Il PLANNER (training_planner.py) sceglie in 2 sole query bulk le leghe da
#      fare (MISSING + STALE<cutoff): niente piu' una-query-per-lega.
#   2) Si addestra UNA lega alla volta (parallel_leagues=1, 1 shost) con gli
#      indici di sql/perf_indexes.sql attivi => letture leggere, I/O sotto soglia.
#   3) TIME-BUDGET: dopo ~165 min il run smette di prendere nuove leghe ed esce
#      pulito (le fatte sono gia' salvate nel registry). timeout-minutes=175 e'
#      una rete di sicurezza: il run NON puo' superare ~3h, mai vicino alle 6h.
#   4) Lo schedule (ogni 6h) fa ripartire il run: il planner esclude le leghe
#      gia' fresche => si riprende da dove si era fermato, fino a CONVERGENZA
#      (quando non resta nulla, i run diventano no-op di pochi secondi).
#
# ⚠️ PREREQUISITO: lanciare sql/perf_indexes.sql nel SQL Editor PRIMA di
#    riabilitare lo schedule. Senza indici ogni training fa SEQ SCAN di `matches`
#    e ri-satura l'I/O. Il workflow parte disabilitato: riabilitare con
#    `gh workflow enable retrain_models.yml` quando gli indici sono in.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Ogni 6h: runda <=3h, quindi sempre >3h di pausa tra un run e il successivo
    # (il DB riposa). Il planner rende ogni run idempotente e auto-riprendibile.
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      total_shards:
        description: "Job paralleli (shard). Su Nano tieni 1 per non stressare l'I/O; alza solo con indici + monitoraggio."
        default: "1"
        required: true
      use_planner:
        description: "Il planner sceglie le leghe (mancanti + stale<cutoff) in 2 query bulk."
        type: choice
        options: ["true", "false"]
        default: "true"
      leagues:
        description: "Override: solo queste leghe (csv, es. 135,39,140). Vuoto = decide il planner."
        default: ""
        required: false
      time_budget_min:
        description: "Stop nuove leghe dopo N minuti (resta sotto le 3h)."
        default: "165"
        required: true
      parallel_leagues:
        description: "Leghe in parallelo per shard. Su Nano tieni 1."
        default: "1"
        required: true
      last_n_seasons:
        description: "Stagioni di training per lega"
        default: "3"
        required: true

# Mai due campagne sovrapposte: un run nuovo attende la fine di quello in corso.
concurrency:
  group: retrain-models
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      shards: ${{ steps.gen.outputs.shards }}
    steps:
      - name: Genera matrice shard
        id: gen
        env:
          TOTAL_SHARDS: ${{ inputs.total_shards || '1' }}
        run: |
          SHARDS=$(python3 -c "import json, sys; print(json.dumps(list(range(int(sys.argv[1])))))" "$TOTAL_SHARDS")
          echo "shards=${SHARDS}" >> "$GITHUB_OUTPUT"
          echo "Matrice shard: ${SHARDS}"

  train:
    needs: plan
    runs-on: ubuntu-latest
    # Rete di sicurezza: il run NON puo' superare ~3h (mai vicino alle 6h).
    # Il time-budget interno (165 min) ferma prima, in modo pulito.
    timeout-minutes: 175
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.plan.outputs.shards) }}
    name: "train shard ${{ matrix.shard }}"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # 3.13 = stessa major.minor del Python di serving sul PC locale.
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements-train.txt

      - name: Install pinned training stack (serving parity)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-train.txt

      - name: Pre-flight DB probe (non stressare un DB gia' lento)
        id: probe
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python - <<'PY'
          import os, time, json, urllib.request
          url = os.environ["SUPABASE_URL"].rstrip("/")
          key = os.environ["SUPABASE_SERVICE_ROLE_KEY"]
          req = urllib.request.Request(
              url + "/rest/v1/ai_model_registry?select=id&limit=1",
              headers={"apikey": key, "Authorization": "Bearer " + key},
          )
          slow = "false"
          t = time.time()
          try:
              urllib.request.urlopen(req, timeout=25).read()
              dt = time.time() - t
              print(f"[PROBE] DB ok in {dt:.1f}s")
              if dt > 12:
                  slow = "true"
                  print("[PROBE] DB lento (>12s): salto questo run per non stressarlo.")
          except Exception as e:
              slow = "true"
              print(f"[PROBE] DB non reattivo ({e!r}): salto questo run.")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"slow={slow}\n")
          PY

      - name: Train shard (planner + time-budget)
        if: steps.probe.outputs.slow != 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # GENTILEZZA SUL DB = solo PARALLEL_LEAGUES=1 (1 sola lega legge dal DB
          # per volta). RETRAIN_N_WORKERS invece e' parallelismo dei 18 target
          # DENTRO una lega, sui dati gia' scaricati UNA volta (build_training_dataset):
          # usa solo la CPU del runner (4 vCPU), ZERO carico DB extra. Quindi 4 =
          # training ~3-4x piu' veloce per lega a parita' di stress sul database.
          RETRAIN_N_WORKERS: "4"
          RETRAIN_PARALLEL_LEAGUES: "1"
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
          # Inputs via env (mai interpolati nello script: anti shell-injection).
          # I fallback servono per i run da cron (inputs vuoti negli eventi schedule).
          SHARD_INDEX: ${{ matrix.shard }}
          TOTAL_SHARDS: ${{ inputs.total_shards || '1' }}
          USE_PLANNER: ${{ inputs.use_planner || 'true' }}
          LEAGUES_INPUT: ${{ inputs.leagues || '' }}
          TIME_BUDGET_MIN: ${{ inputs.time_budget_min || '165' }}
          PARALLEL_LEAGUES: ${{ inputs.parallel_leagues || '1' }}
          LAST_N_SEASONS: ${{ inputs.last_n_seasons || '3' }}
        run: |
          python cloud_retrain_shard.py \
            --shard-index "$SHARD_INDEX" \
            --total-shards "$TOTAL_SHARDS" \
            --use-planner "$USE_PLANNER" \
            --leagues "$LEAGUES_INPUT" \
            --time-budget-min "$TIME_BUDGET_MIN" \
            --parallel-leagues "$PARALLEL_LEAGUES" \
            --last-n-seasons "$LAST_N_SEASONS"

      - name: Upload retrain log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retrain-log-shard-${{ matrix.shard }}
          path: retrain_log_*.txt
          if-no-files-found: ignore
          retention-days: 30
